# EoMT + SurgeNetDINO (DINOv2 ViT-L) - Decoder only
# backbone 완전 고정, EoMT head만 학습

trainer:
  max_epochs: 100
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: logs
      name: tep_dinov2_vitl_decoder
  callbacks:
    - class_path: training.plot_callback.TrainingCurvePlotCallback
      init_args:
        save_dir: logs/tep_dinov2_vitl_decoder/curves
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: metrics/val_iou_all
        patience: 15
        mode: max
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: metrics/val_iou_all
        mode: max
        save_top_k: 1
        filename: best

model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    freeze_strategy: decoder
    lr: 2e-4
    lr_mult: 0.1
    llrd: 0.8
    weight_decay: 0.01
    warmup_steps: [100, 200]
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [0, 500, 1000, 1500]
    attn_mask_annealing_end_steps: [500, 1000, 1500, 2000]
    ignore_idx: 255
    load_ckpt_class_head: False
    ckpt_path: ./weights/DINOv2_ViTl14_size336_SurgeNetXL_EoMT.pth
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 50
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: vit_large_patch14_dinov2
            patch_size: 14

data:
  class_path: datasets.tep_semantic.TEPSemantic
  init_args:
    path: ./TEP_dataset/ro
    split_train: train_ori
    split_val: tune
    img_size: [504, 504]
    num_classes: 5
    batch_size: 8
    num_workers: 4
    color_jitter_enabled: True
    scale_range: [0.5, 2.0]
    # color_jitter_enabled: False
    # scale_range: [1.0, 1.0]